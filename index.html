<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Каталог анекдотов</title>

    <style>
        body {
    margin: 0;
    padding: 0;
    min-height: 100vh;

    background-image: url("https://i.pinimg.com/originals/8a/3f/88/8a3f88703b8b94a0defab67ca0be5501.jpg?nii=t");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

        h1 {
            color: gold;
        }

        button {
            background-color: gold;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 10px;
        }

        select {
            padding: 5px;
            font-size: 16px;
        }

        #joke {
            margin-top: 20px;
            font-size: 18px;
            color: white;
        }

        img {
            width: 200px;
            margin-top: 20px;
            border-radius: 15px;
        }

        .pug {
    position: fixed;
    top: -100px;
    width: 80px;
    animation: fall linear forwards;
    z-index: 1;          
    pointer-events: none; 
}

@keyframes fall {
    from {
        transform: translateY(0) rotate(0deg);
    }
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}
.pug {
    z-index: 0;
    pointer-events: none;
}

#joke {
    position: relative;
    z-index: 10;
}
    </style>
</head>

<body>

<h1>🤣Каталог анекдотов🤣</h1>

<img src="https://i.pinimg.com/originals/93/dd/a6/93dda651f941477847f7f74835f67288.jpg?nii=t">

<br><br>

<select id="category">
    <option value="school">Школа</option>
    <option value="prog">Программисты</option>
    <option value="life">Жизнь</option>
    <option value="all">Общее</option>
    <option value="city">город</option>
</select>

<br><br>

<button onclick="showJoke()">Случайный анекдот</button>

<p id="joke"></p>

<script>
const jokes = {
    school: [
        "Учитель: Почему тетрадь забыл? А голову дома не забыл? Ученик: Спасибо, что напомнили — завтра принесу и то, и другое.",
        "учитель: приведи мне пример на будушее время Ученик: Завтра не приду — это будущее время.",
        "Учитель: почему опоздал Ученик: будильник будил еле разбудил.",
        "учитель: год прошол а у тебя нет тетрадей почему Ученик: я зашитник природы.",
        "Учитель: ты еще ни разу не показал мне домашнее задание где оно Ученик: где то в поралельой вселенной.",
    ],
    prog: [
        "Программист: налейте мне литр пива  Бармен: литр? Програмист 1, или 0, походу я -1 ",
        "Есть 0 тип людей: те, кто понимает двоичную систему",
        "айти это опасная работа после одной ошибки в 500 строчном коде обычные люди рассыпаются.",
        "в лицее начался первый урок програмирования Учитель: найдите здесь ошибку Ученик: нашел Учитель: где Ученик: в моем выборе этой професии.",
        "кто-то чем бы занятся Програмист: открывает терминал.",
    ],
    life: [
        "Хотел начать новую жизнь с чистого листа , но листы закончились.",
        "Планы на день: первое выжить второе пережить третье остатся в живых.",
        "Я не ленивый, я в режиме энергосбережения.",
        "кто-то волейболист что ты делаеш, я отбиваю мяч а ты футболист, я бегаю за мячом как за смыслом жизни.",
        "кто-то я всегда сдерживаюсь Програмист: без кофе я не я.",
    ],
    city: [
        "один тип купил село теперь это село городского типа.",
        "какой бой будет вечным: учитель географии и дальнобойшик играют в города.",
        "В географии я силён: я всегда знаю, что я где-то не там.",
        "Карта говорит правду, пока ты не начинаешь идти по ней.",
        "География простая: чем дальше идёшь, тем больше хочешь домой.",
    ]
};

function showJoke() {
    let cat = document.getElementById("category").value;

    let arr;

    if (cat === "all") {
        arr = Object.values(jokes).flat();
    } else {
        arr = jokes[cat];
    }

    let random = arr[Math.floor(Math.random() * arr.length)];
    document.getElementById("joke").innerText = random;
}
</script>
<script>
    function createPug() {
    let pug = document.createElement("img");
    pug.src = "https://c.tenor.com/MtPbJDCWDZoAAAAC/tenor.gif";
    pug.classList.add("pug");

    pug.style.left = Math.random() * 100 + "vw";
    pug.style.animationDuration = (2 + Math.random() * 3) + "s";

    document.body.appendChild(pug);

    setTimeout(() => {
        pug.remove();
    }, 5000);


}setInterval(createPug, 700);
</script>
</body>
</html>
